<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JimLiuMD Widget Local Test</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #f5fbfa 0%, #eef4f6 100%);
        color: #1f2d3d;
      }
      .wrap {
        max-width: 900px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        padding: 18px;
      }
      code {
        background: #f1f5f7;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Local Widget Test Page</h1>
        <p>
          This page uses the same widget behavior as production. Open <code>http://localhost:3000</code>,
          wait 10 seconds for auto-open, then test onboarding and staff handoff flow.
        </p>
        <p>
          If content answers look outdated, re-run ingestion:
          <code>npm run ingest -- https://jimliumd.com 40</code>
        </p>
      </div>
    </div>

    <script
      src="/clinic-widget.js"
      data-api-base="http://localhost:3000"
      data-assistant-name="Jim Liu MD Assistant"
      data-accent="#0b6b61"
      data-auto-open-ms="10000"
      data-show-sources="false"
      data-staff-phone="(239) 524-0125"
      data-staff-email="info@jimliumd.com"
      defer
    ></script>
  </body>
</html>
